[pytest]
# Pytest configuration for routing engine tests

# Test file pattern
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests for models and services
    integration: Integration tests for API endpoints
    slow: Slow running tests (OSRM, database operations)
    requires_db: Tests that require database connection
    requires_osrm: Tests that require OSRM server

# Coverage options
# Run: pytest --cov=. --cov-report=html
[coverage:run]
branch = True
source = .
omit =
    */tests/*
    */test_*
    */__init__.py
    */config.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
